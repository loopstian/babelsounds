kind = "web"
previewPath = "/"
title = "Babelsounds"
version = "1.0.0"
id = "artifacts/babelsounds"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19504

[services.development]
run = "pnpm --filter @workspace/babelsounds run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/babelsounds", "run", "build" ]
publicDir = "artifacts/babelsounds/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19504"
BASE_PATH = "/"
